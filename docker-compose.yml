version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agentic_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic_network

networks:
  agentic_network:
    driver: bridge

volumes:
  postgres_data:
